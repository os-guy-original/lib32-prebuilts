name: Build lib32-prebuilts

permissions:
  contents: write

on:
  push:
    branches: [main, master]
    paths:
      - 'packages/**'
      - 'packages.conf'
      - 'scripts/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      package:
        description: 'Build specific package only'
      force:
        description: 'Force rebuild all packages'
        type: boolean
        default: false

env:
  PACKAGER: 'Kilo AI <kilo-ai@users.noreply.github.com>'
  MAKEFLAGS: '-j$(nproc)'
  GPG_KEY_ID: 'E4A5D5830B9BD51A'

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest
    timeout-minutes: 360
    
    steps:
    - name: Setup Arch Linux
      run: |
        pacman-key --init
        pacman-key --populate archlinux
        
        if ! grep -q '^\[multilib\]' /etc/pacman.conf; then
          echo -e "\n[multilib]\nInclude = /etc/pacman.d/mirrorlist" >> /etc/pacman.conf
        fi
        
        pacman -Sy --noconfirm
        pacman -S --noconfirm --needed base-devel git multilib-devel sudo meson ninja pkgconf cmake gnupg nasm yasm clang lld gperf unifdef

    - name: Checkout
      uses: actions/checkout@v4

    - name: Import GPG key
      env:
        GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      run: |
        echo "$GPG_PRIVATE_KEY" | gpg --import --batch

    - name: Setup build user
      run: |
        useradd -m -G wheel builder
        echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
        chown -R builder:builder .

    - name: Install 32-bit dependencies
      run: |
        pacman -S --noconfirm --needed \
          lib32-glib2 lib32-pcre2 lib32-libffi lib32-zlib lib32-util-linux \
          lib32-icu lib32-libsoup3 lib32-sqlite lib32-gstreamer \
          lib32-gst-plugins-base-libs lib32-orc lib32-colord lib32-libcups \
          lib32-libepoxy lib32-harfbuzz lib32-harfbuzz-icu lib32-pango lib32-cairo lib32-fontconfig \
          lib32-fribidi lib32-gdk-pixbuf2 lib32-libjpeg-turbo lib32-libva \
          lib32-libpng lib32-libtiff lib32-libx11 lib32-libxcursor lib32-libxdamage \
          lib32-libxext lib32-libxfixes lib32-libxi lib32-libxinerama \
          lib32-libxkbcommon lib32-libxrandr lib32-vulkan-icd-loader lib32-wayland \
          lib32-dbus lib32-json-glib lib32-readline lib32-gtk3 lib32-libevent \
          lib32-at-spi2-core graphene gtk4 tinysparql gst-plugins-bad \
          libcloudproviders wayland-protocols vulkan-headers \
          lib32-sdl2 lib32-alsa-lib lib32-libvdpau \
          lib32-freetype2 lib32-fontconfig lib32-fribidi \
          lib32-libgcrypt lib32-libtasn1 lib32-libwebp \
          lib32-lcms2 lib32-libxslt lib32-atk \
          ffmpeg glib2-devel ruby python ruby-getoptlong

    - name: Check packages status
      id: check
      run: |
        chmod +x scripts/*.sh
        source scripts/common.sh
        
        if [ "${{ inputs.force }}" = "true" ]; then
          echo "needs_build=all" >> $GITHUB_OUTPUT
        else
          needs_build="no"
          while IFS='|' read -r name version depends notes; do
            [[ -z "$name" || "$name" =~ ^# ]] && continue
            if ! check_package_valid "$name" "$version"; then
              needs_build="yes"
              echo "Needs build: $name"
            fi
          done < packages.conf
          echo "needs_build=$needs_build" >> $GITHUB_OUTPUT
        fi

    - name: Build packages
      if: steps.check.outputs.needs_build != 'no' || inputs.force == true
      run: |
        FORCE_FLAG=""
        [ "${{ inputs.force }}" = "true" ] && FORCE_FLAG="-f"
        sudo -u builder ./scripts/build-all.sh $FORCE_FLAG 2>&1 | tee build.log

    - name: Build specific package
      if: inputs.package != ''
      run: |
        pkgdir="packages/${{ inputs.package }}"
        [ -d "$pkgdir" ] || { echo "Package not found"; exit 1; }
        cd "$pkgdir"
        sudo -u builder makepkg -sf --noconfirm -d
        mv *.pkg.tar.* "$GITHUB_WORKSPACE/repo/"

    - name: Sign packages
      run: |
        cd repo
        for pkg in *.pkg.tar.zst; do
          [ -f "$pkg" ] || continue
          if [ ! -f "${pkg}.sig" ] || ! gpg --verify "${pkg}.sig" "$pkg" 2>/dev/null; then
            echo "Signing $pkg..."
            gpg --batch --yes --detach-sign -u $GPG_KEY_ID -o "${pkg}.sig" "$pkg"
          fi
        done

    - name: Update repository database
      run: |
        cd repo
        chmod +x update-repo.sh
        ./update-repo.sh

    - name: Commit to repository
      run: |
        git config --global --add safe.directory '*'
        git config --global user.email "kilo-ai@users.noreply.github.com"
        git config --global user.name "Kilo AI"
        git add -f repo/
        git commit -m "chore: update packages and repo database" || echo "No changes"
        git push origin main

    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: build.log
        retention-days: 7
