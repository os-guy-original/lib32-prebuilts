name: Build lib32-gtk4

permissions:
  contents: write

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      package:
        description: 'Build specific package only'

env:
  PACKAGER: 'Kilo AI <kilo-ai@users.noreply.github.com>'
  MAKEFLAGS: '-j$(nproc)'

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest
    
    steps:
    - name: Setup Arch Linux
      run: |
        pacman-key --init
        pacman-key --populate archlinux
        sed -i '/^#\[multilib\]/,/^#Include/ s/^#//' /etc/pacman.conf
        pacman -Sy --noconfirm
        pacman -S --noconfirm --needed base-devel git multilib-devel sudo meson ninja pkgconf cmake

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup build user
      run: |
        useradd -m -G wheel builder
        echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
        chown -R builder:builder .

    - name: Install 32-bit dependencies
      run: |
        pacman -S --noconfirm --needed \
          lib32-glib2 lib32-pcre2 lib32-libffi lib32-zlib lib32-util-linux \
          lib32-icu lib32-libsoup3 lib32-sqlite lib32-gstreamer \
          lib32-gst-plugins-base-libs lib32-orc lib32-colord lib32-libcups \
          lib32-libepoxy lib32-harfbuzz lib32-pango lib32-cairo lib32-fontconfig \
          lib32-fribidi lib32-gdk-pixbuf2 lib32-libjpeg-turbo lib32-libva \
          lib32-libpng lib32-libtiff lib32-libx11 lib32-libxcursor lib32-libxdamage \
          lib32-libxext lib32-libxfixes lib32-libxi lib32-libxinerama \
          lib32-libxkbcommon lib32-libxrandr lib32-vulkan-icd-loader lib32-wayland \
          lib32-dbus lib32-json-glib lib32-readline lib32-gtk3 lib32-libevent \
          lib32-at-spi2-core graphene gtk4 tinysparql gst-plugins-bad \
          libcloudproviders wayland-protocols vulkan-headers

    - name: Build packages
      run: |
        chmod +x scripts/build-all.sh
        # Output packages to repo/ directory
        sudo -u builder ./scripts/build-all.sh -o "$PWD/repo" 2>&1 | tee build.log

    - name: Build specific package
      if: inputs.package != ''
      run: |
        pkgdir="packages/${{ inputs.package }}"
        [ -d "$pkgdir" ] || { echo "Package not found"; exit 1; }
        cd "$pkgdir"
        sudo -u builder makepkg -sf --noconfirm
        mv *.pkg.tar.* "$GITHUB_WORKSPACE/repo/"

    - name: Update repository database
      run: |
        cd repo
        chmod +x update-repo.sh
        ./update-repo.sh

    - name: Commit to repository
      run: |
        git config --global --add safe.directory '*'
        git config --global user.email "kilo-ai@users.noreply.github.com"
        git config --global user.name "Kilo AI"
        
        git add repo/
        git commit -m "chore: update packages and repo database" || echo "No changes"
        git push origin main

    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: build.log
        retention-days: 7
