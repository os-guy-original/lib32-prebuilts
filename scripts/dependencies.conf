# NOTE: lib32-icu is available from official multilib repo (multilib/lib32-icu)
# Install with: pacman -S lib32-icu

# ============================================================================
# LAYER 3: Tertiary dependencies (depend on layer 2)
# ============================================================================

# NOTE: lib32-gst-plugins-bad-libs is available from official multilib repo (multilib/lib32-gst-plugins-bad-libs)
# Install with: pacman -S lib32-gst-plugins-bad-libs
# We use the system package because building it (1.28.x) is problematic - cuda, amf, and other plugins
# don't have meson options to disable them in this version. The system package works fine.

lib32-tinysparql|3.7.1|lib32-glib2,lib32-sqlite,tinysparql|https://aur.archlinux.org/packages/lib32-tinysparql||Formerly lib32-tracker3; depends on lib32-icu and lib32-libsoup3 from multilib

