# ============================================================================
# LAYER 1: Base dependencies (depend on multilib packages only)
# ============================================================================

lib32-gdbm|1.26|gdbm|https://aur.archlinux.org/packages/lib32-gdbm||Simple build

lib32-graphene|1.10.8|lib32-glib2,graphene|https://aur.archlinux.org/packages/lib32-graphene|--enable-gtk-doc=false|None

lib32-libstemmer|2.2.0||https://aur.archlinux.org/packages/lib32-libstemmer||Requires patch for shared library

lib32-avahi|0.8|lib32-dbus,lib32-glib2,lib32-gdbm,avahi|https://aur.archlinux.org/packages/lib32-avahi||Needs install fixes patch

# ============================================================================
